# Grounding accuracy benchmark targets (§T J.5)
#
# 20 elements total: 10 for Notepad, 10 for Calculator
# Each target has a ground-truth bounding box manually annotated.
#
# Bounding box format: [x_min, y_min, x_max, y_max] in pixels
# The benchmark script checks if the grounding model's output (x, y)
# falls within the box (inclusive).

application: "notepad"
screenshot: "notepad.png"
description: "Windows Notepad elements for grounding accuracy benchmark"
targets:
  - id: notepad-menu-file
    query: "File menu button"
    bbox: [22, 4, 55, 26]
    category: "menu_item"

  - id: notepad-menu-edit
    query: "Edit menu button"
    bbox: [55, 4, 95, 26]
    category: "menu_item"

  - id: notepad-menu-format
    query: "Format menu button"
    bbox: [95, 4, 150, 26]
    category: "menu_item"

  - id: notepad-menu-view
    query: "View menu button"
    bbox: [150, 4, 200, 26]
    category: "menu_item"

  - id: notepad-menu-help
    query: "Help menu button"
    bbox: [200, 4, 250, 26]
    category: "menu_item"

  - id: notepad-text-area
    query: "main text editing area"
    bbox: [0, 30, 800, 570]
    category: "input_area"

  - id: notepad-title-bar
    query: "title bar showing Untitled"
    bbox: [0, 0, 800, 30]
    category: "title_bar"

  - id: notepad-close-button
    query: "close window button (X)"
    bbox: [760, 2, 790, 28]
    category: "window_control"

  - id: notepad-maximize-button
    query: "maximize window button"
    bbox: [730, 2, 760, 28]
    category: "window_control"

  - id: notepad-minimize-button
    query: "minimize window button"
    bbox: [700, 2, 730, 28]
    category: "window_control"

---
application: "calculator"
screenshot: "calculator.png"
description: "Windows Calculator elements for grounding accuracy benchmark"
targets:
  - id: calc-button-7
    query: "number 7 button"
    bbox: [240, 320, 320, 380]
    category: "number_button"

  - id: calc-button-8
    query: "number 8 button"
    bbox: [320, 320, 400, 380]
    category: "number_button"

  - id: calc-button-9
    query: "number 9 button"
    bbox: [400, 320, 480, 380]
    category: "number_button"

  - id: calc-button-plus
    query: "plus sign addition button"
    bbox: [480, 320, 560, 380]
    category: "operator_button"

  - id: calc-button-4
    query: "number 4 button"
    bbox: [240, 380, 320, 440]
    category: "number_button"

  - id: calc-button-5
    query: "number 5 button"
    bbox: [320, 380, 400, 440]
    category: "number_button"

  - id: calc-button-equals
    query: "equals button"
    bbox: [480, 440, 560, 500]
    category: "operator_button"

  - id: calc-display
    query: "calculator display showing the number"
    bbox: [240, 100, 560, 200]
    category: "display"

  - id: calc-button-clear
    query: "clear all button (C or AC)"
    bbox: [400, 260, 480, 320]
    category: "function_button"

  - id: calc-button-divide
    query: "divide button"
    bbox: [480, 260, 560, 320]
    category: "operator_button"
