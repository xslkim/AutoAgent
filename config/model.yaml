# AutoVisionTest Configuration
# See docs/product_document.md §8.4 for full reference.
#
# Single-model UI-TARS agent.  One vLLM service hosts the model at
# ``endpoint``; the engine makes one call per step and gets back
# ``Thought + Action`` with absolute pixel coordinates.

agent:
  backend: "uitars_local"                  # only uitars_local is supported
  model: "ui-tars-1.5-7b"                  # --served-model-name in vLLM
  endpoint: "http://localhost:8000/v1"     # single vLLM service (WSL2)
  max_tokens: 512
  temperature: 0.0                         # deterministic; UI-TARS is trained for greedy decoding
  language: "Chinese"                      # thought language — must match training distribution
  history_images: 3                        # re-send this many most-recent screenshots
  timeout_s: 60.0

runtime:
  max_steps: 50
  max_session_duration_s: 600
  step_wait_ms: 500
  data_dir: "./data"
